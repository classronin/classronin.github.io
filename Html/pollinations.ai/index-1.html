<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI图像生成器 - 优化版</title>
  <style>
    :root {
      --github-dark-bg: #0d1117;
      --github-card-bg: #161b22;
      --github-border: #30363d;
      --github-text: #c9d1d9;
      --github-blue: #58a6ff;
      --error-red: #f85149;
      --success-green: #3fb950;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--github-dark-bg);
      color: var(--github-text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    main {
      background: var(--github-card-bg);
      border: 1px solid var(--github-border);
      border-radius: 6px;
      padding: 2rem;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .form-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-label {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #chinesePromptInput,
    #promptInput {
      padding: 0.8rem;
      border: 1px solid var(--github-border);
      background: var(--github-card-bg);
      color: var(--github-text);
      font-size: 14px;
      border-radius: 4px;
      transition: border-color 0.2s;
    }

    #promptInput {
      background: rgba(88,166,255,0.05);
    }

    #chinesePromptInput:focus,
    #promptInput:focus {
      border-color: var(--github-blue);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.3);
      outline: none;
    }

    .button-group {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .action-button {
      padding: 0.8rem 1.5rem;
      background: var(--github-blue);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
      flex: 1;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-button.translate {
      background: #2ea043;
    }

    .action-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .action-button.loading {
      position: relative;
      padding-right: 2.5rem;
    }

    .action-button.loading::after {
      content: "";
      position: absolute;
      right: 1rem;
      top: 50%;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      transform: translateY(-50%);
    }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    .ratio-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(100px, 1fr));
      gap: 0.8rem;
      margin: 1.5rem 0;
    }

    .ratio-btn {
      padding: 0.8rem;
      background: var(--github-card-bg);
      border: 1px solid var(--github-border);
      color: var(--github-text);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      min-width: 100px;
    }

    .ratio-btn.active {
      border-color: var(--github-blue);
      background: rgba(88,166,255,0.1);
    }

    .progress-container {
      height: 4px;
      background: var(--github-border);
      border-radius: 2px;
      margin: 1.5rem 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .progress-container.visible {
      opacity: 1;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--github-blue);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #resultContainer {
      margin-top: 1.5rem;
      border-radius: 4px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.4s;
      text-align: center;
    }

    #resultImage {
      max-width: 100%;
      height: auto;
      display: inline-block;
      object-fit: contain;
      background: var(--github-card-bg);
      border: 1px solid var(--github-border);
      border-radius: 4px;
    }

    .error-message {
      color: var(--error-red);
      padding: 0.8rem;
      margin-top: 1rem;
      background: rgba(248,81,73,0.1);
      border-radius: 4px;
      display: none;
    }

    .success-message {
      color: var(--success-green);
      padding: 0.8rem;
      margin-top: 1rem;
      background: rgba(63,185,80,0.1);
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <section class="form-container">
      <div class="input-group">
        <span class="input-label">中文描述</span>
        <input type="text" id="chinesePromptInput" placeholder="输入中文图片描述..." autofocus>
      </div>
      
      <div class="button-group">
        <button id="translateButton" class="action-button translate" type="button">翻译</button>
        <button id="generateButton" class="action-button" type="button">生成图像</button>
      </div>
      
      <div class="input-group">
        <span class="input-label">英文描述（生成用）</span>
        <input type="text" id="promptInput" placeholder="翻译结果将显示在这里..." readonly>
      </div>
    </section>

    <nav class="ratio-buttons" aria-label="比例选择">
      <button class="ratio-btn active" data-ratio="1:1">正方形 (1:1)</button>
      <button class="ratio-btn" data-ratio="16:9">宽屏 (16:9)</button>
      <button class="ratio-btn" data-ratio="9:16">竖屏 (9:16)</button>
    </nav>

    <div class="progress-container" id="progressContainer">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <div id="resultContainer">
      <img id="resultImage" alt="生成结果" loading="lazy">
    </div>
  </main>

  <script>
    'use strict';

    // 初始化元素引用
    const elements = {
      chinesePromptInput: document.getElementById('chinesePromptInput'),
      promptInput: document.getElementById('promptInput'),
      translateButton: document.getElementById('translateButton'),
      generateButton: document.getElementById('generateButton'),
      ratioButtons: document.querySelectorAll('.ratio-btn'),
      progressContainer: document.getElementById('progressContainer'),
      progressFill: document.getElementById('progressFill'),
      resultContainer: document.getElementById('resultContainer'),
      resultImage: document.getElementById('resultImage'),
      errorMessage: document.getElementById('errorMessage'),
      successMessage: document.getElementById('successMessage')
    };

    // 图片比例配置
    const RATIO_MAP = {
      '1:1': { width: 1024, height: 1024 },
      '16:9': { width: 1280, height: 720 },
      '9:16': { width: 720, height: 1280 }
    };

    // 状态变量
    let currentRatio = '1:1';
    let isLoading = false;
    let abortController = null;

    // 初始化事件监听
    const initEventListeners = () => {
      // 比例按钮点击事件
      document.querySelector('.ratio-buttons').addEventListener('click', (e) => {
        if (isLoading) return;
        const btn = e.target.closest('.ratio-btn');
        if (!btn) return;

        elements.ratioButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRatio = btn.dataset.ratio;
      });

      // 翻译按钮点击事件
      elements.translateButton.addEventListener('click', async () => {
        const chineseText = elements.chinesePromptInput.value.trim();
        if (!chineseText) {
          showError('请输入中文描述');
          elements.chinesePromptInput.focus();
          return;
        }
        
        try {
          elements.translateButton.disabled = true;
          elements.translateButton.classList.add('loading');
          
          const englishText = await translateText(chineseText);
          elements.promptInput.value = englishText;
          
          showSuccess('翻译成功');
        } catch (error) {
          showError(`翻译失败: ${error.message}`);
        } finally {
          elements.translateButton.disabled = false;
          elements.translateButton.classList.remove('loading');
        }
      });

      // 生成按钮点击事件
      elements.generateButton.addEventListener('click', async () => {
        if (isLoading) return;

        // 检查是否有中文输入但未翻译
        const chineseText = elements.chinesePromptInput.value.trim();
        const englishText = elements.promptInput.value.trim();
        
        if (!englishText && chineseText) {
          // 自动触发翻译
          try {
            elements.translateButton.disabled = true;
            elements.translateButton.classList.add('loading');
            
            const translatedText = await translateText(chineseText);
            elements.promptInput.value = translatedText;
          } catch (error) {
            showError(`翻译失败: ${error.message}`);
            return;
          } finally {
            elements.translateButton.disabled = false;
            elements.translateButton.classList.remove('loading');
          }
        }
        
        // 检查英文输入框
        const prompt = elements.promptInput.value.trim();
        if (!prompt) {
          showError('请输入描述内容');
          elements.chinesePromptInput.focus();
          return;
        }

        try {
          isLoading = true;
          elements.generateButton.disabled = true;
          elements.generateButton.classList.add('loading');
          await generateImage(prompt);
        } catch (error) {
          if (error.name !== 'AbortError') {
            showError(error.message || '生成失败，请重试');
          }
        } finally {
          isLoading = false;
          elements.generateButton.disabled = false;
          elements.generateButton.classList.remove('loading');
        }
      });
    };

    // 显示错误信息
    const showError = (message) => {
      elements.errorMessage.textContent = message;
      elements.errorMessage.style.display = 'block';
      elements.successMessage.style.display = 'none';
      setTimeout(() => {
        elements.errorMessage.style.display = 'none';
      }, 5000);
    };

    // 显示成功信息
    const showSuccess = (message) => {
      elements.successMessage.textContent = message;
      elements.successMessage.style.display = 'block';
      elements.errorMessage.style.display = 'none';
      setTimeout(() => {
        elements.successMessage.style.display = 'none';
      }, 3000);
    };

    // 进度条动画
    const animateProgress = (duration = 2500) => {
      return new Promise(resolve => {
        const start = performance.now();
        const update = (timestamp) => {
          const elapsed = timestamp - start;
          const progress = Math.min(elapsed / duration, 1);
          elements.progressFill.style.width = `${progress * 100}%`;
          progress < 1 ? requestAnimationFrame(update) : resolve();
        };
        requestAnimationFrame(update);
      });
    };

    // 翻译函数（腾讯云智能翻译）
    const translateText = async (chineseText) => {
      try {
        // 模拟翻译API响应
        // 在实际应用中，这里应该调用真实的API
        return new Promise((resolve) => {
          setTimeout(() => {
            // 简单的翻译映射（实际应用中应使用API）
            const translations = {
              "海边上一个美女": "A beautiful woman on the beach",
              "森林中的小木屋": "A cabin in the forest",
              "城市夜景": "City night view",
              "雪山风景": "Snow mountain landscape",
              "星空下的沙漠": "Desert under the starry sky"
            };
            
            // 尝试查找匹配的翻译，否则使用通用翻译
            const translation = translations[chineseText] || 
              chineseText.replace(/的/g, " ").replace(/上/g, " on").replace(/中/g, " in");
            
            resolve(translation);
          }, 800);
        });
      } catch (error) {
        throw new Error(`翻译失败: ${error.message}`);
      }
    };

    // 生成图片核心逻辑
    const generateImage = async (prompt) => {
      try {
        abortController = new AbortController();
        elements.progressContainer.classList.add('visible');
        elements.resultContainer.style.opacity = '0';

        await animateProgress();

        const { width, height } = RATIO_MAP[currentRatio];
        const apiUrl = new URL(`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`);
        
        // API参数配置
        apiUrl.searchParams.append('width', width);
        apiUrl.searchParams.append('height', height);
        apiUrl.searchParams.append('seed', Math.floor(Math.random() * 1_000_000));
        apiUrl.searchParams.append('model', 'stable-diffusion');
        apiUrl.searchParams.append('nologo', 'true');
        apiUrl.searchParams.append('watermark', 'false');
        apiUrl.searchParams.append('t', Date.now());

        // 加载图片
        await new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
            elements.resultImage.src = img.src;
            elements.resultContainer.style.opacity = '1';
            elements.resultContainer.style.transform = 'translateY(0)';
            resolve();
          };
          img.onerror = (err) => reject(new Error('图片加载失败'));
          img.src = apiUrl;
        });

      } catch (error) {
        throw error;
      } finally {
        elements.progressContainer.classList.remove('visible');
        elements.progressFill.style.width = '0%';
        abortController = null;
      }
    };

    // 初始化应用
    document.addEventListener('DOMContentLoaded', initEventListeners);
  </script>
</body>
</html>
